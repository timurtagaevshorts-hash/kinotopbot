<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinoTOP</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
            background: #0b0b0f;
            color: #f5f5f5;
            text-align: center;
            padding: 24px;
        }
        .card {
            max-width: 360px;
        }
        h1 {
            font-size: 1.25rem;
            margin: 0 0 12px;
        }
        p {
            color: #b8b8c2;
            line-height: 1.5;
            margin: 0 0 20px;
        }
        a {
            color: #ff4d6d;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>KinoTOP ochilmoqda...</h1>
        <p id="status">Iltimos, kuting.</p>
        <p><a id="fallback" href="#">Play Marketga o'tish</a></p>
    </div>
    <script>
        (function () {
            var PLAY_STORE = "https://play.google.com/store/apps/details?id=uz.kodlikino.top4";
            var PACKAGE = "uz.kodlikino.top4";
            var SCHEME = "kinotop";

            var match = window.location.pathname.match(/\/open\/(reel|movie)\/([^/]+)/i);
            var status = document.getElementById("status");
            var fallback = document.getElementById("fallback");

            fallback.href = PLAY_STORE;
            fallback.addEventListener("click", function (e) {
                e.preventDefault();
                window.location.href = PLAY_STORE;
            });

            if (!match) {
                status.textContent = "Havola noto'g'ri. Play Marketdan ilovani o'rnating.";
                window.location.replace(PLAY_STORE);
                return;
            }

            var type = match[1].toLowerCase();
            var id = decodeURIComponent(match[2]);
            var encodedId = encodeURIComponent(id);
            var encodedFallback = encodeURIComponent(PLAY_STORE);
            var intentUrl =
                "intent://" + type + "/" + encodedId +
                "#Intent;scheme=" + SCHEME +
                ";package=" + PACKAGE +
                ";S.browser_fallback_url=" + encodedFallback + ";end";
            var deepLink = SCHEME + "://" + type + "/" + id;

            status.textContent = "Ilova ochilmoqda...";

            var isAndroid = /Android/i.test(navigator.userAgent);
            if (isAndroid) {
                window.location.href = intentUrl;
            } else {
                window.location.href = deepLink;
            }

            setTimeout(function () {
                status.textContent = "Ilova topilmadi. Play Marketga yo'naltirilmoqda...";
                window.location.replace(PLAY_STORE);
            }, 2200);
        })();
    </script>
</body>
</html>
