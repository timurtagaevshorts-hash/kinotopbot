<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0">
    <title>KinoTop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root{--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{width:100%;height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:#000;color:#fff}
        
        /* HEADER */
        .header{position:fixed;top:0;left:0;right:0;z-index:100;padding:12px 16px;padding-top:calc(12px + var(--safe-top));display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.9);backdrop-filter:blur(10px)}
        .logo{font-size:1.4rem;font-weight:900;color:#e50914}
        .header-nav{display:flex;gap:12px;align-items:center}
        .header-nav a,.nav-btn{color:#aaa;text-decoration:none;font-size:0.75rem;font-weight:600;cursor:pointer;padding:6px 10px;border-radius:6px;transition:.2s;border:none;background:none}
        .nav-btn.active,.header-nav a.active{color:#fff;background:rgba(255,255,255,0.1)}
        .nav-btn.shorts-btn{background:#e50914;color:#fff!important;padding:8px 16px;border-radius:20px;font-weight:700;font-size:0.8rem}
        .admin-badge{background:rgba(102,126,234,0.2);border:1px solid rgba(102,126,234,0.3);padding:6px 12px;border-radius:20px;font-size:0.7rem;color:#a8b5ff;cursor:pointer;background:none;border:none}

        /* MAIN PAGE */
        #mainPage{width:100%;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-top:56px;padding-top:calc(56px + var(--safe-top));scrollbar-width:none}
        #mainPage::-webkit-scrollbar{display:none}
        .hero{position:relative;padding:40px 20px;background:linear-gradient(135deg,#1a1a2e,#0d0d1a)}
        .hero h1{font-size:2rem;font-weight:900;margin-bottom:8px}
        .hero p{color:#999;font-size:0.9rem;margin-bottom:16px}
        .hero-btns{display:flex;gap:10px;flex-wrap:wrap}
        .btn{padding:12px 24px;border-radius:8px;font-weight:700;font-size:0.9rem;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:8px;text-decoration:none}
        .btn-primary{background:#fff;color:#000}
        .btn-secondary{background:rgba(255,255,255,0.1);color:#fff}
        .btn-red{background:#e50914;color:#fff}
        .row-section{padding:20px 16px}
        .row-title{font-size:1.2rem;font-weight:700;margin-bottom:12px}
        .movie-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
        .movie-card{border-radius:10px;overflow:hidden;background:#1a1a2e;cursor:pointer;transition:.2s;aspect-ratio:2/3;position:relative}
        .movie-card:active{transform:scale(0.97)}
        .movie-card img{width:100%;height:100%;object-fit:cover}
        .movie-card .info{position:absolute;bottom:0;left:0;right:0;padding:30px 10px 10px;background:linear-gradient(transparent,rgba(0,0,0,0.9))}
        .movie-card .info .t{font-size:0.8rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .movie-card .info .m{font-size:0.65rem;color:#aaa;margin-top:2px}
        .movie-card .play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;background:rgba(0,0,0,0.7);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;opacity:0;transition:.2s}
        .movie-card:hover .play-btn,.movie-card:active .play-btn{opacity:1}
        .badge{position:absolute;top:8px;left:8px;background:#e50914;padding:3px 8px;border-radius:4px;font-size:0.6rem;font-weight:700}

        /* SHORTS */
        #shortsPage{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:#000}
        #shortsPage.show{display:flex;flex-direction:column}
        .shorts-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;padding-top:calc(12px + var(--safe-top));z-index:10}
        .shorts-header .close{width:36px;height:36px;background:rgba(255,255,255,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem}
        .shorts-feed{flex:1;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
        .shorts-feed::-webkit-scrollbar{display:none}
        .short-slide{width:100%;height:100%;scroll-snap-align:start;position:relative;display:flex;align-items:center;justify-content:center;background:#000}
        .short-slide video{width:100%;height:100%;object-fit:contain;background:#000}
        .short-overlay{position:absolute;bottom:0;left:0;right:0;padding:20px 16px;padding-bottom:calc(80px + var(--safe-bottom));background:linear-gradient(transparent,rgba(0,0,0,0.9));pointer-events:none;z-index:5}
        .short-overlay .t{font-size:1rem;font-weight:600;margin-bottom:4px}
        .short-overlay .m{font-size:0.75rem;color:#aaa}
        .short-actions{position:absolute;right:12px;bottom:100px;display:flex;flex-direction:column;gap:20px;z-index:10}
        .short-actions .act{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
        .short-actions .act .icon{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:1.3rem}
        .short-actions .act .lbl{font-size:0.7rem;font-weight:600}
        .short-progress{position:absolute;bottom:0;left:0;height:3px;background:#e50914;z-index:5;transition:width .1s linear}

        /* MODALS */
        .modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
        .modal.show{display:flex}
        .modal-box{background:#1a1a2e;border-radius:16px;padding:24px;max-width:450px;width:100%;max-height:90vh;overflow-y:auto;border:1px solid rgba(255,255,255,0.1)}
        .modal-box h2{font-size:1.2rem;margin-bottom:16px}
        .input{width:100%;padding:10px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;font-size:0.9rem;margin-bottom:10px}
        .input:focus{outline:none;border-color:#667eea}
        .btn-full{width:100%;padding:12px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:8px;color:#fff;font-weight:700;font-size:0.9rem;cursor:pointer;margin-top:8px}
        .btn-del{background:#dc3545;color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.75rem}
        .stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
        .stat{background:rgba(255,255,255,0.05);border-radius:10px;padding:14px;text-align:center}
        .stat .v{font-size:1.5rem;font-weight:900;color:#667eea}
        .stat .l{font-size:0.65rem;color:#999;margin-top:2px}
        .list-item{display:flex;align-items:center;gap:10px;padding:8px;background:rgba(255,255,255,0.03);border-radius:8px;margin-bottom:6px}
        .list-item .txt{flex:1;font-size:0.8rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;border-radius:10px;color:#fff;font-weight:600;z-index:400;animation:up .3s}
        .toast-ok{background:#4ade80;color:#000}
        .toast-err{background:#ef4444}
        @keyframes up{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}

        @media(min-width:768px){
            .movie-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}
            .short-slide video{max-width:420px}
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header" id="header">
        <div class="logo">🎬 KinoTop</div>
        <div class="header-nav">
            <a href="#" class="active" onclick="showTab('home')">🏠 Bosh sahifa</a>
            <a href="#" onclick="showTab('home');filterVideos('film')">🎬 Filmlar</a>
            <a href="#" onclick="showTab('home');filterVideos('serial')">📺 Seriallar</a>
            <button class="nav-btn shorts-btn" onclick="openShorts()">⚡ Shorts</button>
            <button class="admin-badge" onclick="showAdminLogin()">🔐</button>
        </div>
    </div>

    <!-- MAIN PAGE -->
    <div id="mainPage">
        <div class="hero">
            <h1 id="heroTitle">KinoTop</h1>
            <p id="heroDesc">Eng sara filmlar va shortslar!</p>
            <div class="hero-btns">
                <a href="https://t.me/Kodlikino_topbot" target="_blank" class="btn btn-primary">📥 Ilovani yuklash</a>
                <button class="btn btn-red" onclick="openShorts()">⚡ Shorts ko'rish</button>
            </div>
            <div style="margin-top:12px;font-size:0.75rem;color:#666">
                📹 <span id="totalVideos">0</span> ta video | 👥 <span id="visitorCount">0</span> ta tashrif
            </div>
        </div>
        <div class="row-section" id="moviesGrid"></div>
    </div>

    <!-- SHORTS PAGE -->
    <div id="shortsPage">
        <div class="shorts-header">
            <span style="font-weight:700">⚡ Shorts</span>
            <div class="close" onclick="closeShorts()">✕</div>
        </div>
        <div class="shorts-feed" id="shortsFeed"></div>
    </div>

    <!-- ADMIN LOGIN -->
    <div class="modal" id="loginModal">
        <div class="modal-box">
            <h2>🔐 Admin kirish</h2>
            <input type="password" class="input" id="adminPass" placeholder="Parol">
            <button class="btn-full" onclick="loginAdmin()">Kirish</button>
            <button style="width:100%;padding:8px;background:none;border:none;color:#666;margin-top:8px;cursor:pointer" onclick="closeModal('loginModal')">Bekor qilish</button>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div class="modal" id="adminPanel">
        <div class="modal-box">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                <h2>📊 Admin Panel</h2>
                <button style="background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer" onclick="closeModal('adminPanel')">✕</button>
            </div>
            
            <div class="stats">
                <div class="stat"><div class="v" id="sVisitors">0</div><div class="l">👥 Tashriflar</div></div>
                <div class="stat"><div class="v" id="sVideos">0</div><div class="l">📹 Videolar</div></div>
                <div class="stat"><div class="v" id="sShorts">0</div><div class="l">⚡ Shortslar</div></div>
                <div class="stat"><div class="v" id="sViews">0</div><div class="l">👁 Ko'rishlar</div></div>
            </div>

            <div style="border-top:1px solid rgba(255,255,255,0.05);padding-top:12px;margin-bottom:12px">
                <h3 style="font-size:0.9rem;margin-bottom:8px">📹 Kino yuklash</h3>
                <input class="input" id="mTitle" placeholder="Kino nomi">
                <input class="input" id="mUrl" placeholder="Video URL (Google Drive)">
                <input class="input" id="mThumb" placeholder="Rasm URL (ixtiyoriy)">
                <select class="input" id="mCat">
                    <option value="film">🎬 Film</option>
                    <option value="serial">📺 Serial</option>
                    <option value="trend">📈 Trend</option>
                </select>
                <button class="btn-full" onclick="addMovie()">📹 Kino qo'shish</button>
            </div>

            <div style="border-top:1px solid rgba(255,255,255,0.05);padding-top:12px;margin-bottom:12px">
                <h3 style="font-size:0.9rem;margin-bottom:8px">⚡ Shorts yuklash</h3>
                <input class="input" id="sTitle" placeholder="Shorts nomi">
                <input class="input" id="sUrl" placeholder="Google Drive video URL">
                <button class="btn-full" style="background:linear-gradient(135deg,#ff2d55,#e50914)" onclick="addShort()">⚡ Shorts qo'shish</button>
            </div>

            <div style="border-top:1px solid rgba(255,255,255,0.05);padding-top:12px">
                <h3 style="font-size:0.9rem;margin-bottom:8px">📋 Kinolar ro'yxati</h3>
                <div id="adminMovieList" style="max-height:200px;overflow-y:auto"></div>
            </div>
        </div>
    </div>

    <div id="toastBox"></div>

    <script>
        // ============ INIT ============
        const tg=window.Telegram?.WebApp;
        if(tg){tg.ready();tg.expand();tg.onEvent('viewportChanged',()=>tg.expand())}

        firebase.initializeApp({apiKey:"AIzaSyCoMOdXHWuI7APp4XgQ6ym3CsEOdpV44_c",authDomain:"kinotop-cef65.firebaseapp.com",projectId:"kinotop-cef65",storageBucket:"kinotop-cef65.firebasestorage.app",messagingSenderId:"34137489356",appId:"1:34137489356:web:247ca6374ec7418ee5a769"});
        const db=firebase.firestore();
        const PASS='Betmilion1';

        let movies=[],shorts=[],currentFilter='all',shortIdx=0;

        // ============ FETCH ============
        async function loadAll(){
            try{
                const[ms,ss,v]=await Promise.all([
                    db.collection('videos').orderBy('createdAt','desc').get(),
                    db.collection('shorts').orderBy('createdAt','desc').get(),
                    db.collection('stats').doc('visitors').get()
                ]);
                movies=[];ms.forEach(d=>movies.push({id:d.id,...d.data()}));
                shorts=[];ss.forEach(d=>shorts.push({id:d.id,...d.data()}));
                document.getElementById('visitorCount').textContent=v.exists?v.data().count||0:0;
                document.getElementById('totalVideos').textContent=movies.length;
                renderMovies();
            }catch(e){console.error(e)}
        }

        async function incVisitor(){
            try{
                const ref=db.collection('stats').doc('visitors');
                await db.runTransaction(async t=>{
                    const d=await t.get(ref);
                    d.exists?t.update(ref,{count:firebase.firestore.FieldValue.increment(1)}):t.set(ref,{count:1});
                });
            }catch(e){}
        }

        // ============ RENDER MOVIES ============
        function renderMovies(){
            const grid=document.getElementById('moviesGrid');
            const filtered=currentFilter==='all'?movies:movies.filter(m=>m.category===currentFilter);
            if(!filtered.length){grid.innerHTML='<div style="text-align:center;padding:40px;color:#555">📭 Video topilmadi</div>';return}

            const cats=[...new Set(filtered.map(m=>m.category||'film'))];
            grid.innerHTML=cats.map(cat=>{
                const items=filtered.filter(m=>(m.category||'film')===cat);
                const label={film:'🎬 Filmlar',serial:'📺 Seriallar',trend:'📈 Trend'}[cat]||cat;
                return `<div style="margin-bottom:20px">
                    <div class="row-title">${label}</div>
                    <div class="movie-grid">${items.map(m=>`
                        <div class="movie-card" onclick="playMovie('${m.id}')">
                            <img src="${m.thumbnail||'https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=400'}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=400'">
                            <div class="play-btn">▶</div>
                            <div class="info"><div class="t">${m.title||''}</div><div class="m">👁 ${m.views||0}</div></div>
                            ${cat==='trend'?'<div class="badge">🔥</div>':''}
                        </div>`).join('')}</div>
                </div>`;
            }).join('');
        }

        function filterVideos(cat){currentFilter=cat;renderMovies();document.getElementById('mainPage').scrollTop=0}

        function playMovie(id){
            const m=movies.find(x=>x.id===id);
            if(m?.url){
                let url=m.url;
                if(url.includes('drive.google.com/file/d/')){const fid=url.split('/file/d/')[1]?.split('/')[0];url=`https://drive.google.com/uc?export=download&id=${fid}`}
                else if(url.includes('drive.google.com/open?id=')){const fid=url.split('open?id=')[1]?.split('&')[0];url=`https://drive.google.com/uc?export=download&id=${fid}`}
                window.open(url,'_blank');
                db.collection('videos').doc(id).update({views:firebase.firestore.FieldValue.increment(1)}).catch(()=>{});
            }
        }

        // ============ SHORTS ============
        function openShorts(){
            document.getElementById('shortsPage').classList.add('show');
            document.getElementById('mainPage').style.display='none';
            renderShorts();
            document.documentElement.style.setProperty('--vh',`${window.innerHeight*0.01}px`);
            shortIdx=0;
            setTimeout(()=>{
                const v=document.querySelector('.short-slide video');
                if(v)v.play().catch(()=>{});
            },300);
        }

        function closeShorts(){
            document.getElementById('shortsPage').classList.remove('show');
            document.getElementById('mainPage').style.display='';
            document.querySelectorAll('.short-slide video').forEach(v=>{v.pause();v.currentTime=0});
        }

        function renderShorts(){
            const feed=document.getElementById('shortsFeed');
            if(!shorts.length){feed.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#555;flex-direction:column"><div style="font-size:4rem">⚡</div><p>Hali shortslar yo\'q</p></div>';return}

            feed.innerHTML=shorts.map((s,i)=>`
                <div class="short-slide" id="ss-${i}">
                    <video src="${getGoogleDriveUrl(s.url)}" loop playsinline webkit-playsinline preload="auto"
                           onloadedmetadata="if(${i}===0)this.play().catch(()=>{})"
                           ontimeupdate="document.getElementById('sp-${i}').style.width=(this.currentTime/this.duration*100)+'%'"
                           onended="nextShort()"></video>
                    <div class="short-progress" id="sp-${i}" style="width:0%"></div>
                    <div class="short-overlay">
                        <div class="t">${s.title||'Shorts'}</div>
                        <div class="m">👁 ${formatNum(s.views||0)}</div>
                    </div>
                    <div class="short-actions">
                        <div class="act" onclick="likeShort('${s.id}')">
                            <div class="icon">❤️</div>
                            <div class="lbl">${formatNum(s.likes||0)}</div>
                        </div>
                        <div class="act" onclick="shareShort('${s.id}')">
                            <div class="icon">↗️</div>
                            <div class="lbl">Share</div>
                        </div>
                    </div>
                </div>
            `).join('');

            setupShortsScroll();
        }

        function setupShortsScroll(){
            const feed=document.getElementById('shortsFeed');
            const observer=new IntersectionObserver((entries)=>{
                entries.forEach(e=>{
                    const idx=parseInt(e.target.id.split('-')[1]);
                    const v=e.target.querySelector('video');
                    if(e.isIntersecting&&e.intersectionRatio>0.5){
                        shortIdx=idx;
                        if(v){v.currentTime=0;v.play().catch(()=>{})}
                        if(shorts[idx])db.collection('shorts').doc(shorts[idx].id).update({views:firebase.firestore.FieldValue.increment(1)}).catch(()=>{});
                    }else{if(v)v.pause()}
                });
            },{threshold:0.6});
            document.querySelectorAll('.short-slide').forEach(el=>observer.observe(el));
        }

        function nextShort(){
            const next=shortIdx+1;
            const el=document.getElementById(`ss-${next}`);
            if(el)el.scrollIntoView({behavior:'smooth'});
        }

        function likeShort(id){
            db.collection('shorts').doc(id).update({likes:firebase.firestore.FieldValue.increment(1)}).catch(()=>{});
            toast('❤️ Like!','ok');
        }

        function shareShort(id){
            const s=shorts.find(x=>x.id===id);
            if(s){
                if(navigator.share)navigator.share({title:s.title,url:s.url}).catch(()=>{});
                else window.open(`https://t.me/share/url?url=${encodeURIComponent(s.url)}`,'_blank');
            }
        }

        function getGoogleDriveUrl(url){
            if(!url)return'';
            if(url.includes('drive.google.com/file/d/')){
                const id=url.split('/file/d/')[1]?.split('/')[0];
                return `https://drive.google.com/uc?export=download&id=${id}`;
            }
            if(url.includes('drive.google.com/open?id=')){
                const id=url.split('open?id=')[1]?.split('&')[0];
                return `https://drive.google.com/uc?export=download&id=${id}`;
            }
            return url;
        }

        // ============ ADMIN ============
        function showAdminLogin(){document.getElementById('loginModal').classList.add('show')}

        function loginAdmin(){
            if(document.getElementById('adminPass').value===PASS){
                document.getElementById('loginModal').classList.remove('show');
                document.getElementById('adminPass').value='';
                openAdmin();
            }else{toast('❌ Noto\'g\'ri parol!','err')}
        }

        async function openAdmin(){
            document.getElementById('adminPanel').classList.add('show');
            try{
                const v=await db.collection('stats').doc('visitors').get();
                document.getElementById('sVisitors').textContent=v.exists?v.data().count||0:0;
                document.getElementById('sVideos').textContent=movies.length;
                document.getElementById('sShorts').textContent=shorts.length;
                let tv=0;movies.forEach(m=>tv+=parseInt(m.views||0));shorts.forEach(s=>tv+=(s.views||0));
                document.getElementById('sViews').textContent=formatNum(tv);
            }catch(e){}
            renderAdminMovies();
        }

        function renderAdminMovies(){
            const el=document.getElementById('adminMovieList');
            if(!movies.length){el.innerHTML='<div style="color:#555;text-align:center;padding:10px">Video yo\'q</div>';return}
            el.innerHTML=movies.map(m=>`
                <div class="list-item">
                    <span class="txt">${m.title||'Nomsiz'} (${m.category||'film'})</span>
                    <button class="btn-del" onclick="deleteMovie('${m.id}')">🗑</button>
                </div>
            `).join('');
        }

        async function addMovie(){
            const t=document.getElementById('mTitle').value.trim();
            const u=document.getElementById('mUrl').value.trim();
            if(!t||!u){toast('❌ Nomi va URL majburiy!','err');return}
            try{
                await db.collection('videos').add({
                    title:t,url:u,thumbnail:document.getElementById('mThumb').value.trim(),
                    category:document.getElementById('mCat').value,views:'0',
                    createdAt:firebase.firestore.FieldValue.serverTimestamp()
                });
                ['mTitle','mUrl','mThumb'].forEach(id=>document.getElementById(id).value='');
                movies=[];(await db.collection('videos').orderBy('createdAt','desc').get()).forEach(d=>movies.push({id:d.id,...d.data()}));
                renderMovies();renderAdminMovies();
                document.getElementById('totalVideos').textContent=movies.length;
                toast('✅ Kino qo\'shildi!','ok');
            }catch(e){toast('❌ Xatolik!','err')}
        }

        async function addShort(){
            const t=document.getElementById('sTitle').value.trim();
            const u=document.getElementById('sUrl').value.trim();
            if(!t||!u){toast('❌ Nomi va URL majburiy!','err');return}
            try{
                await db.collection('shorts').add({
                    title:t,url:u,views:0,likes:0,
                    createdAt:firebase.firestore.FieldValue.serverTimestamp()
                });
                ['sTitle','sUrl'].forEach(id=>document.getElementById(id).value='');
                shorts=[];(await db.collection('shorts').orderBy('createdAt','desc').get()).forEach(d=>shorts.push({id:d.id,...d.data()}));
                document.getElementById('sShorts').textContent=shorts.length;
                toast('✅ Shorts qo\'shildi!','ok');
            }catch(e){toast('❌ Xatolik!','err')}
        }

        async function deleteMovie(id){
            if(!confirm('O\'chirilsinmi?'))return;
            await db.collection('videos').doc(id).delete();
            movies=movies.filter(m=>m.id!==id);
            renderMovies();renderAdminMovies();
            document.getElementById('totalVideos').textContent=movies.length;
            document.getElementById('sVideos').textContent=movies.length;
            toast('🗑 O\'chirildi','ok');
        }

        function closeModal(id){document.getElementById(id).classList.remove('show')}

        // ============ HELPERS ============
        function formatNum(n){if(!n)return'0';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return String(n)}
        function toast(msg,type){
            const t=document.createElement('div');t.className=`toast toast-${type}`;t.textContent=msg;
            document.getElementById('toastBox').appendChild(t);
            setTimeout(()=>{t.remove()},2500);
        }
        function showTab(t){
            if(t==='home'){document.getElementById('mainPage').style.display='';closeShorts();currentFilter='all';renderMovies()}
        }

        // ============ KEYBOARD ============
        document.addEventListener('keydown',e=>{
            if(e.key==='Escape'){closeShorts();closeModal('loginModal');closeModal('adminPanel')}
            if(e.key==='ArrowDown'&&document.getElementById('shortsPage').classList.contains('show'))nextShort();
        });

        // ============ START ============
        incVisitor().then(()=>loadAll());
    </script>
</body>
</html>
