<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | KinoTop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            color: white;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header a {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .header a:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .add-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102,126,234,0.3);
        }
        .form-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            display: none;
        }
        .form-card.show {
            display: block;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
            transition: 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(102,126,234,0.1);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .submit-btn {
            background: #4ade80;
            color: #0a0a1a;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(74,222,128,0.3);
        }
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }
        .video-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
        }
        .video-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
        }
        .video-card img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: #1a1a2e;
        }
        .video-card .info {
            padding: 12px;
        }
        .video-card .title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .video-card .category {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
        }
        .video-card .actions {
            display: flex;
            gap: 8px;
            padding: 8px 12px 12px;
        }
        .video-card .actions button {
            flex: 1;
            padding: 6px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-edit {
            background: rgba(255,193,7,0.2);
            color: #ffc107;
        }
        .btn-edit:hover {
            background: rgba(255,193,7,0.3);
        }
        .btn-delete {
            background: rgba(220,53,69,0.2);
            color: #dc3545;
        }
        .btn-delete:hover {
            background: rgba(220,53,69,0.3);
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.3);
        }
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 16px;
        }
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .videos-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎬 KinoTop Admin Panel</h1>
        <div>
            <a href="/">🔙 Bosh sahifa</a>
        </div>
    </div>

    <button class="add-btn" onclick="toggleForm()">
        <i class="fas fa-plus"></i> Yangi video qo'shish
    </button>

    <!-- Qo'shish formasi -->
    <div class="form-card" id="addForm">
        <h3 style="margin-bottom:20px;">📹 Yangi video</h3>
        <div class="form-row">
            <div class="form-group">
                <label>Sarlavha</label>
                <input type="text" id="title" placeholder="Video nomi">
            </div>
            <div class="form-group">
                <label>Kategoriya</label>
                <select id="category">
                    <option value="trend">Trend</option>
                    <option value="film">Filmlar</option>
                    <option value="short">Shortslar</option>
                    <option value="serial">Seriallar</option>
                    <option value="comedy">Komediya</option>
                    <option value="action">Aksiya</option>
                    <option value="drama">Drama</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Video URL (Google Drive yoki YouTube)</label>
            <input type="url" id="url" placeholder="https://drive.google.com/uc?export=download&id=...">
        </div>
        <div class="form-group">
            <label>Rasm URL (thumbnail)</label>
            <input type="url" id="thumbnail" placeholder="https://example.com/image.jpg">
        </div>
        <div class="form-group">
            <label>Tavsif</label>
            <textarea id="description" rows="3" placeholder="Video haqida qisqacha"></textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Ko'rishlar soni</label>
                <input type="text" id="views" placeholder="1.2M">
            </div>
            <div class="form-group">
                <label>Davomiyligi</label>
                <input type="text" id="duration" placeholder="0:45">
            </div>
        </div>
        <button class="submit-btn" onclick="addVideo()">
            <i class="fas fa-save"></i> Saqlash
        </button>
    </div>

    <!-- Videolar ro'yxati -->
    <h3 style="margin: 30px 0 16px;">📋 Barcha videolar</h3>
    <div class="videos-grid" id="videosGrid">
        <!-- Videolar shu yerga yuklanadi -->
    </div>
</div>

<script>
    // ============ VIDEO MA'LUMOTLARI ============
    let videos = [];

    // ============ YUKLASH ============
    async function loadVideos() {
        try {
            const res = await fetch('/api/shorts');
            if (res.ok) {
                videos = await res.json();
                renderVideos();
            }
        } catch (e) {
            console.error('Yuklash xatosi:', e);
        }
    }

    // ============ KO'RSATISH ============
    function renderVideos() {
        const grid = document.getElementById('videosGrid');
        if (!videos || videos.length === 0) {
            grid.innerHTML = `
                <div class="empty-state" style="grid-column:1/-1;">
                    <i class="fas fa-video-slash"></i>
                    <h3>Video yo'q</h3>
                    <p>Yuqoridagi tugma orqali video qo'shing!</p>
                </div>
            `;
            return;
        }
        grid.innerHTML = videos.map(v => `
            <div class="video-card">
                <img src="${v.thumbnail || 'https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=400'}" 
                     alt="${v.title}"
                     onerror="this.src='https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=400'">
                <div class="info">
                    <div class="title">${escapeHtml(v.title)}</div>
                    <div class="category">${v.category || 'short'}</div>
                </div>
                <div class="actions">
                    <button class="btn-edit" onclick="editVideo(${v.id})">
                        <i class="fas fa-edit"></i> Tahrirlash
                    </button>
                    <button class="btn-delete" onclick="deleteVideo(${v.id})">
                        <i class="fas fa-trash"></i> O'chirish
                    </button>
                </div>
            </div>
        `).join('');
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ============ QO'SHISH ============
    function toggleForm() {
        document.getElementById('addForm').classList.toggle('show');
    }

    async function addVideo() {
        const data = {
            title: document.getElementById('title').value,
            category: document.getElementById('category').value,
            url: document.getElementById('url').value,
            thumbnail: document.getElementById('thumbnail').value,
            description: document.getElementById('description').value,
            views: document.getElementById('views').value || '0',
            duration: document.getElementById('duration').value || '0:30'
        };

        if (!data.title || !data.url) {
            alert('❌ Sarlavha va URL majburiy!');
            return;
        }

        try {
            const res = await fetch('/api/shorts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (res.ok) {
                alert('✅ Video qo\'shildi!');
                toggleForm();
                document.getElementById('addForm').querySelectorAll('input, textarea').forEach(el => el.value = '');
                loadVideos();
            }
        } catch (e) {
            console.error('Qo\'shish xatosi:', e);
            alert('❌ Xatolik yuz berdi!');
        }
    }

    // ============ O'CHIRISH ============
    async function deleteVideo(id) {
        if (!confirm('Rostdan ham o\'chirmoqchimisiz?')) return;
        try {
            const res = await fetch(`/api/shorts/${id}`, { method: 'DELETE' });
            if (res.ok) {
                alert('✅ Video o\'chirildi!');
                loadVideos();
            }
        } catch (e) {
            console.error('O\'chirish xatosi:', e);
            alert('❌ Xatolik yuz berdi!');
        }
    }

    // ============ TAHRIRLASH ============
    function editVideo(id) {
        const video = videos.find(v => v.id === id);
        if (!video) return;
        // Formani to'ldirish
        document.getElementById('title').value = video.title;
        document.getElementById('category').value = video.category || 'short';
        document.getElementById('url').value = video.url;
        document.getElementById('thumbnail').value = video.thumbnail || '';
        document.getElementById('description').value = video.description || '';
        document.getElementById('views').value = video.views || '0';
        document.getElementById('duration').value = video.duration || '0:30';
        
        toggleForm();
        // O'chirish va qayta qo'shish
        deleteVideo(id);
    }

    // ============ ISHGA TUSHIRISH ============
    loadVideos();
</script>
</body>
</html>
