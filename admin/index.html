<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KinoTop | Netflix uslubida</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <meta name="theme-color" content="#e50914">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #141414;
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ============ HEADER ============ */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 16px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
            transition: background 0.3s ease;
        }

        .header.scrolled {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.6rem;
            font-weight: 900;
            color: #e50914;
            text-decoration: none;
        }

        .logo i {
            font-size: 1.8rem;
        }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-nav a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.3s ease;
            cursor: pointer;
        }

        .header-nav a:hover,
        .header-nav a.active {
            color: white;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-actions .search-btn {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .header-actions .search-btn:hover {
            color: white;
        }

        .admin-badge {
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #a8b5ff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .admin-badge:hover {
            background: rgba(102, 126, 234, 0.3);
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        /* ============ HERO BANNER ============ */
        .hero {
            position: relative;
            height: 70vh;
            min-height: 450px;
            display: flex;
            align-items: center;
            padding: 0 60px;
            margin-bottom: 20px;
            background: #141414;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-size: cover;
            background-position: center top;
            opacity: 0.4;
            transition: opacity 1s ease;
        }

        .hero-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to right, rgba(20,20,20,0.9) 20%, transparent 80%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 550px;
        }

        .hero-badge {
            display: inline-block;
            background: #e50914;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 12px;
        }

        .hero-desc {
            font-size: 1.05rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            margin-bottom: 20px;
            max-width: 450px;
        }

        .hero-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-hero {
            padding: 12px 28px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn-hero-primary {
            background: white;
            color: #141414;
        }

        .btn-hero-primary:hover {
            background: rgba(255, 255, 255, 0.8);
        }

        .btn-hero-secondary {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            backdrop-filter: blur(10px);
        }

        .btn-hero-secondary:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .hero-meta {
            display: flex;
            gap: 20px;
            margin-top: 16px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .hero-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ============ ROWS ============ */
        .rows-container {
            padding: 0 30px 40px;
        }

        .row {
            margin-bottom: 30px;
        }

        .row-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 0 10px;
        }

        .row-title {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .row-view-all {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            text-decoration: none;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .row-view-all:hover {
            color: white;
        }

        .row-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 4px 12px;
            scroll-behavior: smooth;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        .row-scroll::-webkit-scrollbar {
            display: none;
        }

        /* ============ MOVIE CARD ============ */
        .movie-card {
            flex: 0 0 200px;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #1a1a2e;
            aspect-ratio: 2 / 3;
        }

        .movie-card:hover {
            transform: scale(1.05);
            z-index: 10;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        .movie-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .movie-card .card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px 12px 12px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .movie-card:hover .card-overlay {
            opacity: 1;
        }

        .movie-card .card-title {
            font-size: 0.85rem;
            font-weight: 600;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .movie-card .card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
        }

        .movie-card .card-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .movie-card:hover .card-play {
            opacity: 1;
        }

        .movie-card .card-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #e50914;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.6rem;
            font-weight: 700;
        }

        /* ============ ADMIN PANEL (Modal) ============ */
        .admin-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .admin-modal.show {
            display: flex;
        }

        .admin-modal-content {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .admin-modal-content h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-modal-content h2 i {
            color: #667eea;
        }

        .admin-close {
            float: right;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.3rem;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .admin-close:hover {
            color: white;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.3);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.3s;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .video-list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .video-list-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
            background: #2a2a3e;
        }

        .video-list-item .info {
            flex: 1;
        }

        .video-list-item .info .title {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .video-list-item .info .category {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
        }

        .video-list-item .actions {
            display: flex;
            gap: 6px;
        }

        /* ============ EMPTY STATE ============ */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.3);
            width: 100%;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-state h3 {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.2rem;
            margin-bottom: 8px;
        }

        /* ============ LOADING ============ */
        .loading-card {
            flex: 0 0 200px;
            aspect-ratio: 2 / 3;
            border-radius: 8px;
            background: linear-gradient(90deg, #1a1a2e 25%, #2a2a3e 50%, #1a1a2e 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 768px) {
            .hero {
                height: 60vh;
                min-height: 400px;
                padding: 0 30px;
            }
            .hero-title {
                font-size: 2.2rem;
            }
            .hero-desc {
                font-size: 0.9rem;
            }
            .rows-container {
                padding: 0 16px 30px;
            }
            .header {
                padding: 12px 16px;
            }
            .header-nav {
                display: none;
            }
            .logo {
                font-size: 1.2rem;
            }
            .movie-card {
                flex: 0 0 140px;
            }
            .loading-card {
                flex: 0 0 140px;
            }
            .row-title {
                font-size: 1rem;
            }
            .admin-modal-content {
                padding: 20px;
                margin: 10px;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .hero-title {
                font-size: 1.8rem;
            }
            .hero {
                padding: 0 16px;
                height: 50vh;
                min-height: 350px;
            }
            .movie-card {
                flex: 0 0 120px;
            }
            .loading-card {
                flex: 0 0 120px;
            }
            .btn-hero {
                padding: 10px 20px;
                font-size: 0.85rem;
            }
            .admin-badge span {
                display: none;
            }
        }
    </style>
</head>
<body>

<!-- ============ HEADER ============ -->
<header class="header" id="header">
    <a href="#" class="logo">
        <i class="fas fa-play-circle"></i>
        KinoTop
    </a>
    <nav class="header-nav">
        <a href="#" class="active" onclick="filterCategory('all')">Bosh sahifa</a>
        <a href="#" onclick="filterCategory('film')">Filmlar</a>
        <a href="#" onclick="filterCategory('short')">Shortslar</a>
        <a href="#" onclick="filterCategory('serial')">Seriallar</a>
        <a href="#" onclick="filterCategory('trend')">Yangiliklar</a>
    </nav>
    <div class="header-actions">
        <span class="search-btn"><i class="fas fa-search"></i></span>
        <span class="admin-badge" onclick="openAdmin()">
            <i class="fas fa-cog"></i>
            <span>Admin</span>
        </span>
        <div class="avatar">👤</div>
    </div>
</header>

<!-- ============ HERO BANNER ============ -->
<div class="hero" id="hero">
    <div class="hero-bg" id="heroBg" style="background-image: url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=1200');"></div>
    <div class="hero-content">
        <div class="hero-badge">🌟 Trending</div>
        <h1 class="hero-title" id="heroTitle">KinoTop</h1>
        <p class="hero-desc" id="heroDesc">Eng sara filmlar va shortslar. Admin panel orqali videolarni boshqaring!</p>
        <div class="hero-buttons">
            <a href="https://t.me/Kodlikino_topbot?start=dowland" target="_blank" class="btn-hero btn-hero-primary">
                <i class="fas fa-download"></i> Dasturni o'rnatish
            </a>
            <button class="btn-hero btn-hero-secondary" onclick="scrollToRows()">
                <i class="fas fa-play"></i> Ko'rish
            </button>
        </div>
        <div class="hero-meta">
            <span><i class="fas fa-film"></i> <span id="totalMovies">0</span> ta video</span>
            <span><i class="fas fa-clock"></i> Yangilangan: <span id="lastUpdated">hozir</span></span>
        </div>
    </div>
</div>

<!-- ============ ROWS CONTAINER ============ -->
<div class="rows-container" id="rowsContainer">
    <!-- Kategoriyalar dinamik ravishda yuklanadi -->
</div>

<!-- ============ ADMIN PANEL (Modal) ============ -->
<div class="admin-modal" id="adminModal">
    <div class="admin-modal-content">
        <button class="admin-close" onclick="closeAdmin()"><i class="fas fa-times"></i></button>
        <h2><i class="fas fa-cog"></i> Admin Panel</h2>
        
        <!-- Qo'shish formasi -->
        <div style="margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.05);">
            <h3 style="font-size: 1rem; margin-bottom: 12px;">📹 Yangi video qo'shish</h3>
            <div class="form-group">
                <label>Sarlavha *</label>
                <input type="text" id="adminTitle" placeholder="Video nomi">
            </div>
            <div class="form-group">
                <label>Video URL (Google Drive / YouTube) *</label>
                <input type="url" id="adminUrl" placeholder="https://drive.google.com/uc?export=download&id=...">
            </div>
            <div class="form-group">
                <label>Rasm URL (thumbnail)</label>
                <input type="url" id="adminThumbnail" placeholder="https://example.com/image.jpg">
            </div>
            <div class="form-group">
                <label>Tavsif</label>
                <textarea id="adminDesc" rows="2" placeholder="Video haqida"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Kategoriya</label>
                    <select id="adminCategory">
                        <option value="trend">📈 Trend</option>
                        <option value="film">🎬 Filmlar</option>
                        <option value="short">📱 Shortslar</option>
                        <option value="serial">📺 Seriallar</option>
                        <option value="comedy">😂 Komediya</option>
                        <option value="action">💥 Aksiya</option>
                        <option value="drama">🎭 Drama</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Davomiyligi</label>
                    <input type="text" id="adminDuration" placeholder="0:45">
                </div>
            </div>
            <button class="btn-submit" onclick="addVideo()">
                <i class="fas fa-plus"></i> Video qo'shish
            </button>
        </div>

        <!-- Videolar ro'yxati -->
        <div>
            <h3 style="font-size: 1rem; margin-bottom: 12px;">📋 Barcha videolar</h3>
            <div id="videoList">
                <!-- Dinamik yuklanadi -->
            </div>
        </div>
    </div>
</div>

<script>
    // ============ DEFAULT VIDEOLAR ============
    const defaultVideos = [
        {
            id: 1,
            title: "Trend Short 🔥",
            description: "Eng qiziqarli short video",
            url: "https://drive.google.com/uc?export=download&id=1ABC123xyz456",
            thumbnail: "https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=400",
            category: "trend",
            views: "1.2M",
            duration: "0:45"
        },
        {
            id: 2,
            title: "Film parchalari 🎬",
            description: "Ajoyib film sahnalari",
            url: "https://drive.google.com/uc?export=download&id=2DEF456uvw789",
            thumbnail: "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=400",
            category: "film",
            views: "856K",
            duration: "1:20"
        },
        {
            id: 3,
            title: "Komediya short 😂",
            description: "Kulgu bilan to'la",
            url: "https://drive.google.com/uc?export=download&id=3GHI789xyz012",
            thumbnail: "https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?w=400",
            category: "comedy",
            views: "2.1M",
            duration: "0:30"
        },
        {
            id: 4,
            title: "Aksion sahnasi 💥",
            description: "Jangarri lahzalar",
            url: "https://drive.google.com/uc?export=download&id=4JKL012abc345",
            thumbnail: "https://images.unsplash.com/photo-1531259683007-016a7b628fc3?w=400",
            category: "action",
            views: "1.5M",
            duration: "0:55"
        },
        {
            id: 5,
            title: "Drama 🎭",
            description: "His-tuyg'ularga boy",
            url: "https://drive.google.com/uc?export=download&id=5MNO345def678",
            thumbnail: "https://images.unsplash.com/photo-1595769816263-7b76f3a5a793?w=400",
            category: "drama",
            views: "678K",
            duration: "1:10"
        },
        {
            id: 6,
            title: "Serial parchalari 📺",
            description: "Mashhur serialdan",
            url: "https://drive.google.com/uc?export=download&id=6PQR678ghi901",
            thumbnail: "https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=400",
            category: "serial",
            views: "923K",
            duration: "1:30"
        }
    ];

    // ============ LOCALSTORAGE ============
    function getVideos() {
        try {
            const data = localStorage.getItem('kinotop_videos');
            if (data) {
                const parsed = JSON.parse(data);
                if (parsed && parsed.length > 0) {
                    return parsed;
                }
            }
        } catch (e) {
            console.log('LocalStorage xatosi:', e);
        }
        // Default ma'lumotlarni saqlash
        localStorage.setItem('kinotop_videos', JSON.stringify(defaultVideos));
        return defaultVideos;
    }

    function saveVideos(videos) {
        localStorage.setItem('kinotop_videos', JSON.stringify(videos));
    }

    // ============ KATEGORIYALAR ============
    const categories = [
        { id: 'all', label: '🔥 Barchasi' },
        { id: 'trend', label: '📈 Trend' },
        { id: 'film', label: '🎬 Filmlar' },
        { id: 'short', label: '📱 Shortslar' },
        { id: 'serial', label: '📺 Seriallar' },
        { id: 'comedy', label: '😂 Komediya' },
        { id: 'action', label: '💥 Aksiya' },
        { id: 'drama', label: '🎭 Drama' }
    ];

    let videos = getVideos();
    let currentCategory = 'all';

    // ============ DOM ELEMENTLARI ============
    const rowsContainer = document.getElementById('rowsContainer');
    const heroTitle = document.getElementById('heroTitle');
    const heroDesc = document.getElementById('heroDesc');
    const totalMovies = document.getElementById('totalMovies');
    const videoList = document.getElementById('videoList');

    // ============ FUNKSIYALAR ============
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function getVideoUrl(url) {
        if (!url) return '';
        // Google Drive URL ni to'g'rilash
        if (url.includes('drive.google.com')) {
            const match = url.match(/[?&]id=([^&]+)/);
            if (match) return `https://drive.google.com/uc?export=download&id=${match[1]}`;
            const match2 = url.match(/\/d\/([^\/]+)/);
            if (match2) return `https://drive.google.com/uc?export=download&id=${match2[1]}`;
        }
        return url;
    }

    function getThumbnail(video) {
        if (video.thumbnail) return video.thumbnail;
        if (video.url && video.url.includes('youtube.com/embed/')) {
            const id = video.url.split('/embed/')[1]?.split('?')[0];
            if (id) return `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
        }
        return 'https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=400';
    }

    // ============ RENDER ============
    function renderHero() {
        const sorted = [...videos].sort((a, b) => {
            const viewsA = parseInt(a.views?.replace(/[^0-9]/g, '') || 0);
            const viewsB = parseInt(b.views?.replace(/[^0-9]/g, '') || 0);
            return viewsB - viewsA;
        });
        
        const topVideo = sorted[0];
        if (topVideo) {
            heroTitle.textContent = topVideo.title || 'KinoTop';
            heroDesc.textContent = topVideo.description || 'Eng sara filmlar va shortslar';
            const bg = document.getElementById('heroBg');
            if (topVideo.thumbnail) {
                bg.style.backgroundImage = `url(${topVideo.thumbnail})`;
            }
        }
        
        totalMovies.textContent = videos.length;
        document.getElementById('lastUpdated').textContent = new Date().toLocaleDateString('uz-UZ');
    }

    function renderRows() {
        rowsContainer.innerHTML = '';

        if (videos.length === 0) {
            rowsContainer.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-video-slash"></i>
                    <h3>Video topilmadi</h3>
                    <p>Admin panel orqali videolarni qo'shing!</p>
                    <button onclick="openAdmin()" style="margin-top:16px;padding:12px 28px;background:#e50914;color:white;border:none;border-radius:6px;font-weight:600;cursor:pointer;">
                        <i class="fas fa-plus"></i> Admin panel
                    </button>
                </div>
            `;
            return;
        }

        // "Barchasi" kategoriyasi
        if (currentCategory === 'all') {
            renderRow('all', '🔥 Barchasi', videos);
            
            // Har bir kategoriya bo'yicha
            categories.forEach(cat => {
                if (cat.id === 'all') return;
                const filtered = videos.filter(v => v.category === cat.id);
                if (filtered.length > 0) {
                    renderRow(cat.id, cat.label, filtered);
                }
            });
        } else {
            // Filtr
            const filtered = videos.filter(v => v.category === currentCategory);
            if (filtered.length > 0) {
                const catLabel = categories.find(c => c.id === currentCategory)?.label || currentCategory;
                renderRow(currentCategory, catLabel, filtered);
            } else {
                rowsContainer.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <h3>Bu kategoriyada video yo'q</h3>
                        <p>Boshqa kategoriyalarni ko'ring yoki video qo'shing!</p>
                    </div>
                `;
            }
        }
    }

    function renderRow(categoryId, title, videosList) {
        if (!videosList || videosList.length === 0) return;

        const rowDiv = document.createElement('div');
        rowDiv.className = 'row';

        rowDiv.innerHTML = `
            <div class="row-header">
                <h2 class="row-title">${escapeHtml(title)}</h2>
                <span class="row-view-all" onclick="scrollRow('${categoryId}')">
                    Hammasini ko'rish <i class="fas fa-chevron-right"></i>
                </span>
            </div>
            <div class="row-scroll" id="row-${categoryId}">
                ${videosList.map(video => `
                    <div class="movie-card" onclick="playVideo('${video.id}')">
                        <img src="${getThumbnail(video)}" alt="${escapeHtml(video.title)}" loading="lazy" 
                             onerror="this.src='https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=400'">
                        <div class="card-play"><i class="fas fa-play"></i></div>
                        <div class="card-overlay">
                            <div class="card-title">${escapeHtml(video.title)}</div>
                            <div class="card-meta">
                                <span><i class="fas fa-eye"></i> ${video.views || '0'}</span>
                                <span>•</span>
                                <span><i class="fas fa-clock"></i> ${video.duration || '0:30'}</span>
                            </div>
                        </div>
                        ${video.category === 'trend' ? '<div class="card-badge">🔥</div>' : ''}
                    </div>
                `).join('')}
            </div>
        `;

        rowsContainer.appendChild(rowDiv);
    }

    // ============ FILTER ============
    function filterCategory(category) {
        currentCategory = category;
        document.querySelectorAll('.header-nav a').forEach(el => el.classList.remove('active'));
        document.querySelector(`.header-nav a[onclick*="${category}"]`)?.classList.add('active');
        renderRows();
    }

    // ============ PLAY VIDEO ============
    function playVideo(id) {
        const video = videos.find(v => v.id == id);
        if (!video) {
            alert('❌ Video topilmadi!');
            return;
        }
        if (!video.url) {
            alert('❌ Video URL topilmadi!');
            return;
        }

        const videoUrl = getVideoUrl(video.url);
        window.open(videoUrl, '_blank');
    }

    // ============ SCROLL ============
    function scrollRow(categoryId) {
        const row = document.getElementById(`row-${categoryId}`);
        if (row) {
            row.scrollBy({ left: 300, behavior: 'smooth' });
        }
    }

    function scrollToRows() {
        document.querySelector('.rows-container').scrollIntoView({ behavior: 'smooth' });
    }

    // ============ ADMIN PANEL ============
    function openAdmin() {
        document.getElementById('adminModal').classList.add('show');
        renderAdminList();
    }

    function closeAdmin() {
        document.getElementById('adminModal').classList.remove('show');
    }

    function renderAdminList() {
        if (videos.length === 0) {
            videoList.innerHTML = `
                <div style="text-align:center;padding:20px;color:rgba(255,255,255,0.3);">
                    <p>Video yo'q. Yangi video qo'shing!</p>
                </div>
            `;
            return;
        }

        videoList.innerHTML = videos.map(v => `
            <div class="video-list-item">
                <img src="${getThumbnail(v)}" alt="${v.title}" onerror="this.src='https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=400'">
                <div class="info">
                    <div class="title">${escapeHtml(v.title)}</div>
                    <div class="category">${v.category || 'short'}</div>
                </div>
                <div class="actions">
                    <button class="btn-danger" onclick="deleteVideo(${v.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        `).join('');
    }

    // ============ ADD VIDEO ============
    function addVideo() {
        const title = document.getElementById('adminTitle').value.trim();
        const url = document.getElementById('adminUrl').value.trim();
        const thumbnail = document.getElementById('adminThumbnail').value.trim();
        const description = document.getElementById('adminDesc').value.trim();
        const category = document.getElementById('adminCategory').value;
        const duration = document.getElementById('adminDuration').value.trim() || '0:30';

        if (!title || !url) {
            alert('❌ Sarlavha va URL majburiy!');
            return;
        }

        const newVideo = {
            id: Date.now(),
            title: title,
            url: url,
            thumbnail: thumbnail || '',
            description: description || '',
            category: category,
            views: '0',
            duration: duration
        };

        videos.push(newVideo);
        saveVideos(videos);
        
        // Formani tozalash
        document.getElementById('adminTitle').value = '';
        document.getElementById('adminUrl').value = '';
        document.getElementById('adminThumbnail').value = '';
        document.getElementById('adminDesc').value = '';
        document.getElementById('adminDuration').value = '';

        renderAdminList();
        renderHero();
        renderRows();
        
        alert('✅ Video qo\'shildi!');
    }

    // ============ DELETE VIDEO ============
    function deleteVideo(id) {
        if (!confirm('Rostdan ham o\'chirmoqchimisiz?')) return;
        videos = videos.filter(v => v.id !== id);
        saveVideos(videos);
        renderAdminList();
        renderHero();
        renderRows();
        alert('✅ Video o\'chirildi!');
    }

    // ============ HEADER SCROLL ============
    window.addEventListener('scroll', () => {
        const header = document.getElementById('header');
        if (window.scrollY > 50) {
            header.classList.add('scrolled');
        } else {
            header.classList.remove('scrolled');
        }
    });

    // ============ ESCAPE ============
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeAdmin();
    });

    // ============ MODAL CLOSE ON CLICK OUTSIDE ============
    document.getElementById('adminModal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeAdmin();
    });

    // ============ INIT ============
    renderHero();
    renderRows();

    console.log('🎬 KinoTop Netlify versiyasi yuklandi!');
    console.log(`📊 Jami: ${videos.length} ta video`);
    console.log('💾 Ma\'lumotlar localStorage da saqlanadi');
    console.log('🔧 Admin panel: yuqori o\'ng burchakdagi "Admin" tugmasi');
</script>
</body>
</html>
