<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0">
    <title>KinoTop | Netflix uslubida</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root {
            --tg-theme-bg-color: #141414;
            --tg-theme-text-color: #ffffff;
            --tg-theme-hint-color: #999999;
            --tg-theme-link-color: #667eea;
            --tg-theme-button-color: #e50914;
            --tg-theme-button-text-color: #ffffff;
            --safe-area-top: env(safe-area-inset-top, 0px);
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body { 
            width: 100%; height: 100%; overflow-x: hidden;
            font-family: 'Inter', sans-serif; 
            background: var(--tg-theme-bg-color); 
            color: var(--tg-theme-text-color); 
        }

        body {
            overflow-y: auto; -webkit-overflow-scrolling: touch;
            min-height: 100vh; min-height: -webkit-fill-available;
        }

        .header { 
            position: fixed; top: 0; left: 0; right: 0; z-index: 100; 
            padding: 16px 20px; padding-top: calc(16px + var(--safe-area-top));
            display: flex; align-items: center; justify-content: space-between; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%); 
            transition: background 0.3s ease; 
        }
        .header.scrolled { background: rgba(20,20,20,0.95); backdrop-filter: blur(10px); }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 1.6rem; font-weight: 900; color: var(--tg-theme-button-color); text-decoration: none; }
        .logo i { font-size: 1.8rem; }
        .header-nav { display: flex; align-items: center; gap: 16px; }
        .header-nav a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.8rem; font-weight: 500; transition: color 0.3s ease; cursor: pointer; white-space: nowrap; }
        .header-nav a:hover, .header-nav a.active { color: white; }
        
        /* Shorts tugmasi */
        .shorts-btn {
            background: linear-gradient(135deg, #ff2d55, #e50914);
            padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600;
            color: white !important; cursor: pointer; transition: all 0.3s ease;
        }
        .shorts-btn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(229,9,20,0.4); }

        .header-actions { display: flex; align-items: center; gap: 12px; }
        .admin-badge { background: rgba(102,126,234,0.2); border: 1px solid rgba(102,126,234,0.3); padding: 4px 10px; border-radius: 20px; font-size: 0.65rem; color: #a8b5ff; cursor: pointer; transition: all 0.3s ease; }
        .admin-badge:hover { background: rgba(102,126,234,0.3); }

        /* ============ SHORTS CONTAINER (TO'LIQ EKRAN) ============ */
        .shorts-fullscreen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 200;
            background: #000; display: none; flex-direction: column;
        }
        .shorts-fullscreen.show { display: flex; }

        .shorts-feed {
            flex: 1; overflow-y: scroll; scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch; scrollbar-width: none;
        }
        .shorts-feed::-webkit-scrollbar { display: none; }

        .short-slide {
            width: 100%; height: 100vh; height: calc(var(--vh, 1vh) * 100);
            scroll-snap-align: start; position: relative;
            display: flex; align-items: center; justify-content: center; background: #000;
        }
        .short-slide video {
            width: 100%; height: 100%; object-fit: contain; background: #000;
        }
        .short-slide-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 20px 16px; padding-bottom: calc(100px + var(--safe-area-bottom));
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 60%);
            z-index: 10; pointer-events: none;
        }
        .short-slide-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .short-slide-meta { font-size: 12px; color: rgba(255,255,255,0.7); display: flex; align-items: center; gap: 8px; }
        .short-slide-actions {
            position: absolute; right: 12px; bottom: 140px;
            display: flex; flex-direction: column; gap: 20px; z-index: 20; align-items: center;
        }
        .short-action-btn {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            cursor: pointer; transition: transform 0.2s ease; pointer-events: auto;
        }
        .short-action-btn:active { transform: scale(0.9); }
        .short-action-icon {
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center; font-size: 22px;
        }
        .short-action-btn.liked .short-action-icon { color: #ff2d55; }
        .short-action-label { font-size: 11px; font-weight: 600; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
        .shorts-close {
            position: absolute; top: calc(16px + var(--safe-area-top)); right: 16px;
            z-index: 30; width: 36px; height: 36px; border-radius: 50%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: white; font-size: 18px; pointer-events: auto;
        }
        .shorts-category-tabs {
            position: absolute; top: calc(60px + var(--safe-area-top)); left: 0; right: 0;
            display: flex; gap: 8px; padding: 0 16px; overflow-x: auto; z-index: 30;
            scrollbar-width: none; pointer-events: auto;
        }
        .shorts-category-tabs::-webkit-scrollbar { display: none; }
        .shorts-cat-tab {
            padding: 6px 14px; border-radius: 16px; font-size: 12px; font-weight: 500;
            cursor: pointer; white-space: nowrap; transition: all 0.3s ease; flex-shrink: 0;
        }
        .shorts-cat-tab.active { background: #e50914; color: #fff; }
        .shorts-cat-tab:not(.active) { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }
        .short-progress {
            position: absolute; bottom: 0; left: 0; height: 3px; background: #e50914; z-index: 25;
            transition: width 0.1s linear;
        }

        /* ============ HERO ============ */
        .hero { position: relative; height: 70vh; min-height: 450px; display: flex; align-items: center; padding: 0 60px; margin-bottom: 20px; background: #141414; overflow: hidden; }
        .hero-bg { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-size: cover; background-position: center top; opacity: 0.4; transition: opacity 1s ease; }
        .hero-bg::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(to right, rgba(20,20,20,0.9) 20%, transparent 80%); }
        .hero-content { position: relative; z-index: 2; max-width: 550px; }
        .hero-badge { display: inline-block; background: var(--tg-theme-button-color); padding: 4px 12px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 1px; }
        .hero-title { font-size: 3.5rem; font-weight: 900; line-height: 1.1; margin-bottom: 12px; }
        .hero-desc { font-size: 1.05rem; color: rgba(255,255,255,0.7); line-height: 1.6; margin-bottom: 20px; max-width: 450px; }
        .hero-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn-hero { padding: 12px 28px; border-radius: 6px; font-size: 1rem; font-weight: 600; border: none; cursor: pointer; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 10px; text-decoration: none; }
        .btn-hero-primary { background: var(--tg-theme-button-text-color); color: #141414; }
        .btn-hero-secondary { background: rgba(255,255,255,0.15); color: white; backdrop-filter: blur(10px); }
        .hero-meta { display: flex; gap: 20px; margin-top: 16px; font-size: 0.85rem; color: rgba(255,255,255,0.5); }
        .hero-meta span { display: flex; align-items: center; gap: 6px; }

        /* ============ ROWS ============ */
        .rows-container { padding: 0 30px 40px; padding-bottom: calc(40px + var(--safe-area-bottom)); }
        .row { margin-bottom: 30px; }
        .row-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding: 0 10px; }
        .row-title { font-size: 1.3rem; font-weight: 700; }
        .row-view-all { color: rgba(255,255,255,0.5); font-size: 0.8rem; text-decoration: none; transition: color 0.3s ease; display: flex; align-items: center; gap: 4px; cursor: pointer; }
        .row-view-all:hover { color: white; }
        .row-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 8px 4px 12px; scroll-behavior: smooth; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .row-scroll::-webkit-scrollbar { display: none; }
        .movie-card { flex: 0 0 200px; border-radius: 8px; overflow: hidden; position: relative; cursor: pointer; transition: all 0.3s ease; background: #1a1a2e; aspect-ratio: 2/3; }
        .movie-card:hover { transform: scale(1.05); z-index: 10; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }
        .movie-card .card-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 40px 12px 12px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); opacity: 0; transition: opacity 0.3s ease; }
        .movie-card:hover .card-overlay { opacity: 1; }
        .movie-card .card-title { font-size: 0.85rem; font-weight: 600; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .movie-card .card-meta { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; color: rgba(255,255,255,0.5); margin-top: 4px; }
        .movie-card .card-play { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.3rem; opacity: 0; transition: opacity 0.3s ease; border: 2px solid rgba(255,255,255,0.2); }
        .movie-card:hover .card-play { opacity: 1; }
        .movie-card .card-badge { position: absolute; top: 8px; right: 8px; background: var(--tg-theme-button-color); padding: 2px 8px; border-radius: 4px; font-size: 0.6rem; font-weight: 700; }

        /* ============ MODALS ============ */
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; padding-top: calc(20px + var(--safe-area-top)); padding-bottom: calc(20px + var(--safe-area-bottom)); }
        .modal.show { display: flex; }
        .modal-content { background: #1a1a2e; border-radius: 20px; padding: 30px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }
        .modal-content h2 { font-size: 1.5rem; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
        .modal-close { float: right; background: none; border: none; color: rgba(255,255,255,0.5); font-size: 1.3rem; cursor: pointer; }
        .modal-close:hover { color: white; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; color: rgba(255,255,255,0.7); font-size: 0.8rem; font-weight: 500; margin-bottom: 4px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; font-size: 0.9rem; transition: 0.3s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--tg-theme-link-color); background: rgba(102,126,234,0.1); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-submit { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--tg-theme-link-color), #764ba2); border: none; border-radius: 8px; color: white; font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.3s ease; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(102,126,234,0.3); }
        .btn-danger { background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; transition: 0.3s; }
        .video-list-item { display: flex; align-items: center; gap: 12px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .video-list-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; background: #2a2a3e; }
        .video-list-item .info { flex: 1; }
        .video-list-item .info .title { font-weight: 600; font-size: 0.85rem; }
        .video-list-item .info .category { font-size: 0.7rem; color: rgba(255,255,255,0.4); }
        .video-list-item .actions { display: flex; gap: 6px; }

        /* ============ STATS ============ */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-card .stat-value { font-size: 1.8rem; font-weight: 900; color: var(--tg-theme-link-color); }
        .stat-card .stat-label { font-size: 0.7rem; color: rgba(255,255,255,0.5); margin-top: 4px; }

        .empty-state { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.3); width: 100%; }
        .empty-state i { font-size: 4rem; margin-bottom: 16px; opacity: 0.3; }
        .empty-state h3 { color: rgba(255,255,255,0.5); font-size: 1.2rem; margin-bottom: 8px; }

        .toast { position: fixed; bottom: calc(30px + var(--safe-area-bottom)); right: 30px; padding: 14px 24px; border-radius: 12px; color: white; font-weight: 600; z-index: 2000; animation: slideUp 0.4s ease; max-width: 400px; }
        .toast-success { background: #4ade80; color: #0a0a1a; }
        .toast-error { background: #ef4444; }
        .toast-info { background: var(--tg-theme-link-color); }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        @media (max-width: 768px) {
            .hero { height: 60vh; min-height: 400px; padding: 0 30px; }
            .hero-title { font-size: 2.2rem; }
            .header-nav a:not(.shorts-btn) { display: none; }
            .rows-container { padding: 0 16px 30px; }
            .header { padding: 12px 14px; padding-top: calc(12px + var(--safe-area-top)); }
            .movie-card { flex: 0 0 140px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 480px) {
            .hero-title { font-size: 1.8rem; }
            .hero { padding: 0 16px; height: 50vh; min-height: 350px; }
            .movie-card { flex: 0 0 120px; }
            .btn-hero { padding: 10px 20px; font-size: 0.85rem; }
            .admin-badge span { display: none; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header" id="header">

    <!-- MAIN CONTENT -->
    <div id="mainContent">

            <div class="hero-content">
                <div class="hero-badge">🌟 Trending</div>

                <p class="hero-desc" id="heroDesc">Eng sara filmlar va shortslar!</p>
                <div class="hero-buttons">
                    <a href="https://t.me/Kodlikino_topbot?start=dowland" target="_blank" class="btn-hero btn-hero-primary">

                    </a>
                    <button class="btn-hero btn-hero-secondary" onclick="openShortsFullscreen()">

                    <span><i class="fas fa-film"></i> <span id="totalMovies">0</span> ta video</span>

    <!-- SHORTS FULLSCREEN -->

    <!-- ADMIN LOGIN MODAL -->

                <label>Parol</label>

    <div class="modal" id="adminModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('adminModal')">✕</button>
            <h2><i class="fas fa-cog"></i> Admin Panel</h2>

            <!-- STATISTIKA -->
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-value" id="statVisitors">0</div>
                    <div class="stat-label">👥 Tashriflar</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statVideos">0</div>
                    <div class="stat-label">📹 Videolar</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statShorts">0</div>
                    <div class="stat-label">🎬 Shortslar</div>
                </div>

                    <div class="stat-value" id="statTotalViews">0</div>

            <div style="margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.05);">

                <div class="form-group"><label>Rasm URL</label><input type="url" id="adminThumbnail" placeholder="https://example.com/image.jpg"></div>

                        <label>Kategoriya</label>

                            <option value="trend">📈 Trend</option><option value="film">🎬 Filmlar</option>

                </div>

            </div>

                <div id="videoList"></div>
            </div>

    <div id="toastContainer"></div>

    <script>
        // ============ TELEGRAM ============
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); tg.onEvent('viewportChanged', () => tg.expand()); }

        // ============ FIREBASE ============
        const firebaseConfig = {
            apiKey: "AIzaSyCoMOdXHWuI7APp4XgQ6ym3CsEOdpV44_c",
            authDomain: "kinotop-cef65.firebaseapp.com",
            projectId: "kinotop-cef65",
            storageBucket: "kinotop-cef65.firebasestorage.app",
            messagingSenderId: "34137489356",
            appId: "1:34137489356:web:247ca6374ec7418ee5a769"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ============ STATE ============
        let videos = [], shorts = [];
        let currentCategory = 'all';
        let currentShortIndex = 0;
        let shortCurrentCategory = 'all';
        const ADMIN_PASSWORD = 'Betmilion1';

        // ============ VISITOR COUNTER ============
        async function incrementVisitorCount() {
            try {
                const ref = db.collection('stats').doc('visitors');
                await db.runTransaction(async (transaction) => {
                    const doc = await transaction.get(ref);
                    if (!doc.exists) {
                        transaction.set(ref, { count: 1, lastVisit: new Date().toISOString() });
                    } else {
                        transaction.update(ref, { 
                            count: firebase.firestore.FieldValue.increment(1),
                            lastVisit: new Date().toISOString()
                        });
                    }
                });
            } catch (e) { console.error('Visitor count error:', e); }
        }

        // ============ FETCH ============
        async function fetchVideos() {
            try {
                const snapshot = await db.collection('videos').orderBy('createdAt', 'desc').get();
                videos = []; snapshot.forEach(doc => videos.push({ id: doc.id, ...doc.data() }));
                return videos;
            } catch (e) { console.error(e); return []; }
        }

        async function fetchShorts() {
            try {
                const snapshot = await db.collection('shorts').orderBy('createdAt', 'desc').get();
                shorts = []; snapshot.forEach(doc => shorts.push({ id: doc.id, ...doc.data() }));
                return shorts;
            } catch (e) { console.error(e); return []; }
        }

        async function fetchStats() {
            try {
                const visitorDoc = await db.collection('stats').doc('visitors').get();
                const visitorCount = visitorDoc.exists ? (visitorDoc.data().count || 0) : 0;
                
                let totalViews = 0;
                videos.forEach(v => totalViews += parseInt(v.views?.replace(/[^0-9]/g, '') || 0));
                shorts.forEach(s => totalViews += (s.views || 0));

                document.getElementById('statVisitors').textContent = formatNum(visitorCount);
                document.getElementById('statVideos').textContent = videos.length;
                document.getElementById('statShorts').textContent = shorts.length;
                document.getElementById('statTotalViews').textContent = formatNum(totalViews);
            } catch (e) { console.error(e); }
        }

        // ============ SAVE / DELETE ============
        async function saveVideo(video) {
            try {
                const docRef = await db.collection('videos').add({
                    ...video, views: video.views || '0', duration: video.duration || '0:30',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showToast('✅ Video saqlandi!', 'success');
                return true;
            } catch (e) { showToast('❌ Xatolik!', 'error'); return false; }
        }

        async function deleteVideoFromFirebase(id) {
            try { await db.collection('videos').doc(id).delete(); return true; }
            catch (e) { return false; }
        }

        // ============ RENDER MAIN ============
        function renderHero() {
            const top = [...videos].sort((a, b) => (parseInt(b.views?.replace(/[^0-9]/g, '') || 0)) - (parseInt(a.views?.replace(/[^0-9]/g, '') || 0)))[0];
            if (top) {
                document.getElementById('heroTitle').textContent = top.title;
                document.getElementById('heroDesc').textContent = top.description || '';
                if (top.thumbnail) document.getElementById('heroBg').style.backgroundImage = `url(${top.thumbnail})`;
            }
            document.getElementById('totalMovies').textContent = videos.length;
            document.getElementById('lastUpdated').textContent = new Date().toLocaleDateString('uz-UZ');
        }

        function renderRows() {
            const container = document.getElementById('rowsContainer');
            if (videos.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-video-slash"></i><h3>Video topilmadi</h3></div>`;
                return;
            }
            const cats = ['all', 'trend', 'film', 'short', 'serial'];
            const labels = { all: '🔥 Barchasi', trend: '📈 Trend', film: '🎬 Filmlar', short: '📱 Shortslar', serial: '📺 Seriallar' };
            
            container.innerHTML = '';
            if (currentCategory === 'all') {
                cats.forEach(cat => {
                    const filtered = cat === 'all' ? videos : videos.filter(v => v.category === cat);
                    if (filtered.length > 0) renderRow(container, cat, labels[cat], filtered);
                });
            } else {
                const filtered = videos.filter(v => v.category === currentCategory);
                if (filtered.length > 0) renderRow(container, currentCategory, labels[currentCategory] || currentCategory, filtered);
                else container.innerHTML = `<div class="empty-state"><i class="fas fa-search"></i><h3>Video yo'q</h3></div>`;
            }
        }

        function renderRow(container, catId, title, list) {
            const div = document.createElement('div'); div.className = 'row';
            div.innerHTML = `<div class="row-header"><h2 class="row-title">${title}</h2></div>
            <div class="row-scroll">${list.map(v => `
                <div class="movie-card" onclick="playVideo('${v.id}')">
                    <img src="${v.thumbnail || 'https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=400'}" onerror="this.src='https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=400'">
                    <div class="card-play"><i class="fas fa-play"></i></div>
                    <div class="card-overlay"><div class="card-title">${v.title}</div><div class="card-meta"><span>👁 ${v.views||'0'}</span><span>•</span><span>${v.duration||'0:30'}</span></div></div>
                    ${v.category==='trend'?'<div class="card-badge">🔥</div>':''}
                </div>`).join('')}</div>`;
            container.appendChild(div);
        }

        function showMainPage() {
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('shortsFullscreen').classList.remove('show');
            currentCategory = 'all';
            renderRows();
        }

        function filterCategory(cat) { currentCategory = cat; renderRows(); }
        function playVideo(id) {
            const v = videos.find(x => x.id == id);
            if (v?.url) window.open(getVideoUrl(v.url), '_blank');
        }
        function getVideoUrl(url) {
            if (!url) return '';
            if (url.includes('drive.google.com/file/d/')) {
                const id = url.split('/file/d/')[1]?.split('/')[0];
                return `https://drive.google.com/uc?export=download&id=${id}`;
            }
            return url;
        }

        // ============ SHORTS FULLSCREEN ============
        function openShortsFullscreen() {
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('shortsFullscreen').classList.add('show');
            document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
            renderShortsCategories();
            renderShortsFeed();
            setupShortsObserver();
        }

        function closeShorts() {
            document.getElementById('shortsFullscreen').classList.remove('show');
            document.getElementById('mainContent').style.display = 'block';
            document.querySelectorAll('.short-slide video').forEach(v => { v.pause(); v.currentTime = 0; });
        }

        function renderShortsCategories() {
            const cats = ['all', 'trending', 'comedy', 'action', 'music', 'sport'];
            const labels = { all: '🔥 All', trending: '📈 Trend', comedy: '😂 Comedy', action: '💥 Action', music: '🎵 Music', sport: '⚽ Sport' };
            document.getElementById('shortsCategoryTabs').innerHTML = cats.map(c => 
                `<div class="shorts-cat-tab ${c === shortCurrentCategory ? 'active' : ''}" onclick="filterShortsCategory('${c}')">${labels[c]}</div>`
            ).join('');
        }

        function filterShortsCategory(cat) {
            shortCurrentCategory = cat;
            renderShortsCategories();
            renderShortsFeed();
            setupShortsObserver();
        }

        function renderShortsFeed() {
            const feed = document.getElementById('shortsFeed');
            const filtered = shortCurrentCategory === 'all' ? shorts : shorts.filter(s => s.category === shortCurrentCategory);
            
            if (filtered.length === 0) {
                feed.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:rgba(255,255,255,0.3);flex-direction:column;gap:12px;"><i class="fas fa-video-slash" style="font-size:48px;"></i><p>Shortslar yo'q</p></div>`;
                return;
            }

            feed.innerHTML = filtered.map((s, i) => `
                <div class="short-slide" id="shortSlide-${i}">
                    <video src="${s.url}" loop playsinline webkit-playsinline preload="metadata" 
                           onloadedmetadata="if(${i}===0) this.play().catch(()=>{})"
                           ontimeupdate="updateShortProgress(${i}, this)"
                           onended="nextShort()"></video>
                    <div class="short-progress" id="shortProgress-${i}" style="width:0%"></div>
                    <div class="short-slide-overlay">
                        <div class="short-slide-title">${s.title || ''}</div>
                        <div class="short-slide-meta">
                            <span>👁 ${formatNum(s.views || 0)}</span>
                            <span>•</span>
                            <span>${s.category || 'trending'}</span>
                        </div>
                    </div>
                    <div class="short-slide-actions">
                        <div class="short-action-btn" onclick="likeShort('${s.id}', ${i})">
                            <div class="short-action-icon">❤️</div>
                            <div class="short-action-label">${formatNum(s.likes || 0)}</div>
                        </div>
                        <div class="short-action-btn" onclick="shareShort('${s.id}')">
                            <div class="short-action-icon">↗️</div>
                            <div class="short-action-label">Share</div>
                        </div>
                    </div>
                </div>
            `).join('');

            updateShortViewCount(filtered[0]?.id);
        }

        function setupShortsObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const idx = parseInt(entry.target.id.split('-')[1]);
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting && entry.intersectionRatio > 0.5) {
                        currentShortIndex = idx;
                        if (video) video.play().catch(() => {});
                        const filtered = getFilteredShorts();
                        if (filtered[idx]) updateShortViewCount(filtered[idx].id);
                    } else {
                        if (video) { video.pause(); video.currentTime = 0; }
                    }
                });
            }, { threshold: 0.5 });
            document.querySelectorAll('.short-slide').forEach(el => observer.observe(el));
        }

        function getFilteredShorts() {
            return shortCurrentCategory === 'all' ? shorts : shorts.filter(s => s.category === shortCurrentCategory);
        }

        function updateShortProgress(idx, video) {
            const bar = document.getElementById(`shortProgress-${idx}`);
            if (bar && video.duration) bar.style.width = (video.currentTime / video.duration * 100) + '%';
        }

        function nextShort() {
            const next = currentShortIndex + 1;
            const el = document.getElementById(`shortSlide-${next}`);
            if (el) el.scrollIntoView({ behavior: 'smooth' });
        }

        async function updateShortViewCount(id) {
            if (!id) return;
            try { await db.collection('shorts').doc(id).update({ views: firebase.firestore.FieldValue.increment(1) }); } catch (e) {}
        }

        async function likeShort(id, idx) {
            try {
                await db.collection('shorts').doc(id).update({ likes: firebase.firestore.FieldValue.increment(1) });
                const btn = document.querySelector(`#shortSlide-${idx} .short-action-btn`);
                if (btn) { btn.classList.add('liked'); const s = shorts.find(x => x.id === id); if (s) { s.likes = (s.likes||0)+1; btn.querySelector('.short-action-label').textContent = formatNum(s.likes); } }
            } catch (e) {}
        }

        function shareShort(id) {
            const s = shorts.find(x => x.id === id);
            if (s && navigator.share) { navigator.share({ title: s.title, url: s.url }).catch(() => {}); }
            else if (s) window.open(`https://t.me/share/url?url=${encodeURIComponent(s.url)}`, '_blank');
        }

        // ============ ADMIN ============
        function showAdminLogin() {
            document.getElementById('adminLoginModal').classList.add('show');
        }

        function checkAdminPassword() {
            const pass = document.getElementById('adminPassword').value;
            if (pass === ADMIN_PASSWORD) {
                document.getElementById('adminLoginModal').classList.remove('show');
                document.getElementById('adminPassword').value = '';
                openAdminPanel();
            } else {
                showToast('❌ Noto\'g\'ri parol!', 'error');
            }
        }

        async function openAdminPanel() {
            document.getElementById('adminModal').classList.add('show');
            await fetchStats();
            renderAdminVideoList();
        }

        function renderAdminVideoList() {
            const list = document.getElementById('videoList');
            if (videos.length === 0) {
                list.innerHTML = `<div style="text-align:center;color:rgba(255,255,255,0.3);padding:20px;">Video yo'q</div>`;
                return;
            }
            list.innerHTML = videos.map(v => `
                <div class="video-list-item">
                    <img src="${v.thumbnail || 'https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=400'}" onerror="this.src='https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=400'">
                    <div class="info"><div class="title">${v.title}</div><div class="category">${v.category}</div></div>
                    <div class="actions"><button class="btn-danger" onclick="deleteVideo('${v.id}')"><i class="fas fa-trash"></i></button></div>
                </div>
            `).join('');
        }

        async function addVideo() {
            const title = document.getElementById('adminTitle').value.trim();
            const url = document.getElementById('adminUrl').value.trim();
            if (!title || !url) { showToast('❌ Sarlavha va URL majburiy!', 'error'); return; }
            
            const video = {
                title, url, thumbnail: document.getElementById('adminThumbnail').value.trim(),
                description: document.getElementById('adminDesc').value.trim(),
                category: document.getElementById('adminCategory').value,
                duration: document.getElementById('adminDuration').value.trim() || '0:30', views: '0'
            };

            if (await saveVideo(video)) {
                ['adminTitle','adminUrl','adminThumbnail','adminDesc','adminDuration'].forEach(id => document.getElementById(id).value = '');
                videos = await fetchVideos();
                renderHero(); renderRows(); renderAdminVideoList();
                await fetchStats();
            }
        }

        async function deleteVideo(id) {
            if (!confirm('O\'chirishni tasdiqlaysizmi?')) return;
            if (await deleteVideoFromFirebase(id)) {
                videos = videos.filter(v => v.id !== id);
                renderHero(); renderRows(); renderAdminVideoList();
                await fetchStats();
                showToast('✅ O\'chirildi!', 'success');
            }
        }

        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        // ============ HELPERS ============
        function formatNum(n) { if (!n) return '0'; if (n >= 1e6) return (n/1e6).toFixed(1)+'M'; if (n >= 1e3) return (n/1e3).toFixed(1)+'K'; return n.toString(); }
        function showToast(msg, type) {
            const t = document.createElement('div'); t.className = `toast toast-${type}`; t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 3000);
        }

        // ============ KEYBOARD ============
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowDown' && document.getElementById('shortsFullscreen').classList.contains('show')) nextShort();
            if (e.key === 'Escape') { closeModal('adminModal'); closeModal('adminLoginModal'); closeShorts(); }
        });

        // ============ HEADER SCROLL ============
        window.addEventListener('scroll', () => {
            document.getElementById('header').classList.toggle('scrolled', window.scrollY > 50);
        });

        // ============ INIT ============
        async function init() {
            await incrementVisitorCount();
            videos = await fetchVideos();
            shorts = await fetchShorts();
            renderHero(); renderRows();
            console.log('🎬 KinoTop tayyor!', videos.length, 'ta video,', shorts.length, 'ta short');
        }

        init();
    </script>
</body>
</html>
